spring:
  application:
    name: travelgo-gateway
  cloud:
    gateway:
      routes:
        # Autenticación (login) -> travelgo-spa-api
        - id: auth-service
          uri: ${SPA_API_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**

        # Paquetes turísticos y reservas -> travelgo-spa-api
        - id: packages-service
          uri: ${SPA_API_URL:http://localhost:8081}
          predicates:
            - Path=/api/packages/**

        - id: reservations-service
          uri: ${SPA_API_URL:http://localhost:8081}
          predicates:
            - Path=/api/reservations/**

        # Usuarios -> travelgo-user-service
        - id: users-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**

        # Reseñas -> travelgo-review-service
        - id: reviews-service
          uri: ${REVIEW_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/reviews/**

        # Destinos -> travelgo-destination-service
        - id: destinations-service
          uri: ${DESTINATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/destinations/**

        # Wishlist -> travelgo-wishlist-service
        - id: wishlist-service
          uri: ${WISHLIST_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/wishlist/**

        # Pagos -> travelgo-payment-service
        - id: payments-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/payments/**

        # Notificaciones -> travelgo-notification-service
        - id: notifications-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/notifications/**

        # Promociones -> travelgo-promotion-service
        - id: promotions-service
          uri: ${PROMOTION_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/promotions/**

        # Soporte -> travelgo-support-service
        - id: support-service
          uri: ${SUPPORT_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/support-tickets/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.travelgo: DEBUG
    org.springframework.cloud.gateway: INFO